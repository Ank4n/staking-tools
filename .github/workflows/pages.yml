name: Deploy site to GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel in-progress runs on new pushes.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # Gate the deploy on typecheck + golden tests so a broken calculator can't ship.
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          # Exact pin: pnpm 11.12.0's self-installer is broken ("Cannot use 'in'
          # operator to search for 'integrity' in undefined"); a floating "11"
          # resolves to it and kills the job before any project step runs.
          version: 11.11.0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate PAPI descriptors (offline, from committed metadata)
        run: pnpm papi

      - name: Typecheck
        run: pnpm typecheck

      - name: Test
        run: pnpm test

  build:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          # Exact pin: pnpm 11.12.0's self-installer is broken ("Cannot use 'in'
          # operator to search for 'integrity' in undefined"); a floating "11"
          # resolves to it and kills the job before any project step runs.
          version: 11.11.0

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate PAPI descriptors (offline, from committed metadata)
        run: pnpm papi

      - name: Build site
        run: pnpm build-site

      - uses: actions/upload-pages-artifact@v5
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
